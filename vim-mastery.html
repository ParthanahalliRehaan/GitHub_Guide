<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIM MASTERY</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #7c6af7;
    --accent4: #00d4ff;
    --text: #e0e0e0;
    --muted: #555;
    --dim: #333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: 'VIM';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 260px;
    color: rgba(0,255,136,0.03);
    pointer-events: none;
    line-height: 1;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 100px);
    letter-spacing: 4px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 60px rgba(0,255,136,0.3);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding-bottom: 8px;
  }

  .mode-legend {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Search */
  .search-bar {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .search-prompt {
    color: var(--accent);
    font-size: 14px;
  }

  #search {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    flex: 1;
    caret-color: var(--accent);
  }

  #search::placeholder { color: var(--muted); }

  .search-count {
    font-size: 11px;
    color: var(--muted);
  }

  /* Category tabs */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    font-family: 'JetBrains Mono', monospace;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main layout */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px;
  }

  .section {
    margin-bottom: 60px;
    display: none;
  }

  .section.visible { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
  }

  .section-count {
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--dim);
    padding: 3px 8px;
    letter-spacing: 1px;
  }

  /* Command grid */
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }

  .cmd-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: border-color 0.15s, background 0.15s;
    cursor: default;
  }

  .cmd-card:hover {
    border-color: var(--dim);
    background: #161616;
  }

  .cmd-card.hidden { display: none; }

  .cmd-key {
    font-size: 13px;
    font-weight: 700;
    min-width: 90px;
    padding: 3px 8px;
    text-align: center;
    border-radius: 3px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  /* color by category */
  .cat-motion .cmd-key    { color: var(--accent);  background: rgba(0,255,136,0.08);  border: 1px solid rgba(0,255,136,0.2); }
  .cat-insert .cmd-key    { color: var(--accent2); background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); }
  .cat-edit .cmd-key      { color: var(--accent3); background: rgba(124,106,247,0.08);border: 1px solid rgba(124,106,247,0.2); }
  .cat-visual .cmd-key    { color: var(--accent4); background: rgba(0,212,255,0.08);  border: 1px solid rgba(0,212,255,0.2); }
  .cat-search .cmd-key    { color: #ffcc00;        background: rgba(255,204,0,0.08);  border: 1px solid rgba(255,204,0,0.2); }
  .cat-file .cmd-key      { color: #ff4d6d;        background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); }
  .cat-macro .cmd-key     { color: #c3f73a;        background: rgba(195,247,58,0.08); border: 1px solid rgba(195,247,58,0.2); }
  .cat-window .cmd-key    { color: #f7a072;        background: rgba(247,160,114,0.08);border: 1px solid rgba(247,160,114,0.2); }
  .cat-advanced .cmd-key  { color: #c0a0ff;        background: rgba(192,160,255,0.08);border: 1px solid rgba(192,160,255,0.2); }

  .cmd-desc {
    font-size: 12px;
    color: #aaa;
    line-height: 1.5;
    flex: 1;
  }

  .cmd-desc strong {
    color: var(--text);
    font-weight: 500;
  }

  /* All section */
  #all-grid .cmd-card { display: flex; }
  #all-grid .cmd-card.hidden { display: none; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 80px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    display: none;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-wrap: gap;
    gap: 10px;
  }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Highlight match */
  .highlight { color: var(--accent); background: rgba(0,255,136,0.15); border-radius: 2px; }

  @media (max-width: 600px) {
    header, main, .search-bar, .tabs, footer { padding-left: 20px; padding-right: 20px; }
    h1 { font-size: 52px; }
    .cmd-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>VIM</h1>
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:#444;letter-spacing:3px;">MASTERY</div>
      <div class="subtitle">The complete command reference</div>
    </div>
  </div>
  <div class="mode-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00ff88"></div> Motion / Navigation</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6b35"></div> Insert Mode</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c6af7"></div> Editing</div>
    <div class="legend-item"><div class="legend-dot" style="background:#00d4ff"></div> Visual Mode</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffcc00"></div> Search & Replace</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff4d6d"></div> File & Buffers</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c3f73a"></div> Macros & Registers</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f7a072"></div> Windows & Tabs</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0a0ff"></div> Advanced</div>
  </div>
</header>

<div class="search-bar">
  <span class="search-prompt">/</span>
  <input id="search" type="text" placeholder="search commands..." autocomplete="off" spellcheck="false">
  <span class="search-count" id="count"></span>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="motion">Motion</button>
  <button class="tab" data-cat="insert">Insert</button>
  <button class="tab" data-cat="edit">Editing</button>
  <button class="tab" data-cat="visual">Visual</button>
  <button class="tab" data-cat="search">Search</button>
  <button class="tab" data-cat="file">File</button>
  <button class="tab" data-cat="macro">Macros</button>
  <button class="tab" data-cat="window">Windows</button>
  <button class="tab" data-cat="advanced">Advanced</button>
</div>

<main>
  <div class="no-results" id="no-results">// no commands matched</div>
  <div id="sections"></div>
</main>

<footer>
  <span>VIM MASTERY REF<span class="cursor-blink"></span></span>
  <span style="color:#333">:wq</span>
</footer>

// Build all sections
const sectionsEl = document.getElementById('sections');
const allCards = [];

Object.entries(COMMANDS).forEach(([cat, data]) => {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec-' + cat;
  sec.innerHTML = `
    <div class="section-header">
      <div class="section-title" style="color: var(--text)">${data.title}</div>
      <div class="section-count">${data.cmds.length} commands</div>
    </div>
    <div class="cmd-grid" id="grid-${cat}"></div>
  `;
  sectionsEl.appendChild(sec);

  const grid = sec.querySelector(`#grid-${cat}`);
  data.cmds.forEach(([key, desc]) => {
    const card = document.createElement('div');
    card.className = `cmd-card ${data.color}`;
    card.dataset.cat = cat;
    card.dataset.key = key.toLowerCase();
    card.dataset.desc = desc.replace(/<[^>]+>/g,'').toLowerCase();
    card.innerHTML = `<span class="cmd-key">${escHtml(key)}</span><span class="cmd-desc">${desc}</span>`;
    grid.appendChild(card);
    allCards.push(card);
  });
});

// All section (mirrors all cards)
const allSec = document.createElement('div');
allSec.className = 'section visible';
allSec.id = 'sec-all';
allSec.innerHTML = `<div class="cmd-grid" id="all-grid"></div>`;
sectionsEl.prepend(allSec);
const allGrid = document.getElementById('all-grid');
allCards.forEach(card => {
  allGrid.appendChild(card.cloneNode(true));
});
updateCount();

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const cat = tab.dataset.cat;

  document.querySelectorAll('.section').forEach(s => {
    s.classList.toggle('visible', s.id === 'sec-' + cat);
  });

  document.getElementById('search').value = '';
  allCards.forEach(c => c.classList.remove('hidden'));
  document.querySelectorAll('#all-grid .cmd-card').forEach(c => c.classList.remove('hidden'));
  document.getElementById('no-results').style.display = 'none';
  updateCount();
});

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const activeCat = document.querySelector('.tab.active').dataset.cat;

  if (!q) {
    allCards.forEach(c => c.classList.remove('hidden'));
    document.querySelectorAll('#all-grid .cmd-card').forEach(c => c.classList.remove('hidden'));
    document.getElementById('no-results').style.display = 'none';
    updateCount();
    return;
  }

  let visible = 0;

  // Filter in all-grid
  document.querySelectorAll('#all-grid .cmd-card').forEach(card => {
    const matches = card.dataset.key.includes(q) || card.dataset.desc.includes(q);
    card.classList.toggle('hidden', !matches);
  });

  // Filter in individual grids
  allCards.forEach(card => {
    const matches = card.dataset.key.includes(q) || card.dataset.desc.includes(q);
    card.classList.toggle('hidden', !matches);
    if (matches) visible++;
  });

  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('count').textContent = visible + ' results';
});

function updateCount() {
  const total = allCards.length;
  document.getElementById('count').textContent = total + ' commands';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
